name: TWRP Build

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device Codename'
        required: true
        default: 'm13'
      dt_branch:
        description: 'Device Tree Branch'
        required: true
        default: 'twrp-12.1'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: android_root

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 bc ccache wget

      - name: Setup repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Repo Init
        working-directory: android_root
        run: repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1

      - name: Create Local Manifest
        working-directory: android_root
        run: |
          mkdir -p .repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?><manifest><project name="Andrexxxxxxxx/android_device_samsung_a13" path="device/samsung/${{ github.event.inputs.device }}" remote="github" revision="${{ github.event.inputs.dt_branch }}" /></manifest>' > .repo/local_manifests/roomservice.xml

      - name: Download Firmware (TO /tmp)
        working-directory: android_root
        run: |
          mkdir -p /tmp/fw
          wget -q -O /tmp/fw/Image.gz "https://github.com/Andrexxxxxxxx/android_device_samsung_a13/releases/download/v1.0/Image.gz"
          wget -q -O /tmp/fw/dtbo.img "https://github.com/Andrexxxxxxxx/android_device_samsung_a13/releases/download/v1.0/dtbo.img"
          [ $(stat -c%s /tmp/fw/Image.gz) -lt 1000000 ] && echo "Image.gz too small!" && exit 1
          [ $(stat -c%s /tmp/fw/dtbo.img) -lt 1000000 ] && echo "dtbo.img too small!" && exit 1

      - name: Repo Sync
        working-directory: android_root
        run: |
          rm -rf .repo/projects/device/samsung/${{ github.event.inputs.device }}.git
          rm -rf device/samsung/${{ github.event.inputs.device }}
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Copy Firmware AFTER Sync
        working-directory: android_root
        run: |
          mkdir -p device/samsung/${{ github.event.inputs.device }}/prebuilt
          cp /tmp/fw/Image.gz device/samsung/${{ github.event.inputs.device }}/prebuilt/
          cp /tmp/fw/dtbo.img device/samsung/${{ github.event.inputs.device }}/prebuilt/
          ls -lh device/samsung/${{ github.event.inputs.device }}/prebuilt/

      - name: Build TWRP
        working-directory: android_root
        run: |
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_${{ github.event.inputs.device }}-eng
          mka recoveryimage -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-${{ github.event.inputs.device }}
          path: android_root/out/target/product/${{ github.event.inputs.device }}/recovery.img