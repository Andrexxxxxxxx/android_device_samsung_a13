name: TWRP Build

on:
  workflow_dispatch:
    inputs:
      device:
        description: 'Device Codename'
        required: true
        default: 'm13'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: android_root

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 bc ccache wget

      - name: Setup repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Repo Init
        working-directory: android_root
        run: repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1

      - name: Create Local Manifest
        working-directory: android_root
        run: |
          mkdir -p .repo/local_manifests
          echo '<?xml version="1.0" encoding="UTF-8"?><manifest><project name="Andrexxxxxxxx/android_device_samsung_a13" path="device/samsung/m13" remote="github" revision="twrp-12.1" /></manifest>' > .repo/local_manifests/roomservice.xml

      - name: Repo Sync
        working-directory: android_root
        run: repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags

      - name: Build TWRP
        working-directory: android_root
        run: |
          export ALLOW_MISSING_DEPENDENCIES=true
          export SKIP_VIRTUAL_AB_IMAGES=true
          source build/envsetup.sh
          lunch twrp_m13-eng
          mka recoveryimage -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-m13
          path: android_root/out/target/product/m13/recovery.img
